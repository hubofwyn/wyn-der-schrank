<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Wyn der Schrank</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* Portrait orientation overlay — prompts rotation to landscape */
      #portrait-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a1a2e;
        color: #e0e0e0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: monospace;
        font-size: 1.25rem;
        text-align: center;
        padding: 2rem;
      }
      #portrait-overlay .rotate-icon {
        font-size: 3rem;
      }
      @media (orientation: portrait) {
        #portrait-overlay { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="portrait-overlay">
      <div class="rotate-icon">&#x1F504;</div>
      <div>Please rotate your device to landscape</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
